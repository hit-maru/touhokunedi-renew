name: Deploy on microCMS publish

on:
  repository_dispatch:
    types: [microcms-publish]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp sshpass
          
          cat > /tmp/ssh_wrapper.sh << 'WRAPPER'
          #!/bin/bash
          sshpass -p "$SFTP_PASSPHRASE" ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$@"
          WRAPPER
          chmod +x /tmp/ssh_wrapper.sh
          
          lftp -u ${{ secrets.SFTP_USERNAME }}, sftp://${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }} << LFTP_COMMANDS
          set sftp:connect-program "/tmp/ssh_wrapper.sh"
          set net:max-retries 3
          mirror -R --delete --exclude='.git' --exclude='node_modules/' --exclude='fonts/' dist/ /home/xb408031/touhokunedi.com/public_html/
          bye
          LFTP_COMMANDS
        env:
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
